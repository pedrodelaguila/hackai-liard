name: Build and Deploy

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'dwg-parser/**'
      - '.github/workflows/deploy.yml'
      - 'docker-compose.prod.yml'
      - 'nginx.conf'
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'
      - 'dwg-parser/**'
      - '.github/workflows/deploy.yml'
      - 'docker-compose.prod.yml'
      - 'nginx.conf'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: |
          ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/backend
          ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/dwg-parser
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=sha,prefix={{branch}}-
          type=raw,value=latest,enable={{is_default_branch}}

    - name: Build and push backend image
      uses: docker/build-push-action@v5
      with:
        context: ./backend
        push: true
        tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/backend:${{ github.sha }},${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/backend:latest
        platforms: linux/amd64
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Build and push dwg-parser image
      uses: docker/build-push-action@v5
      with:
        context: ./dwg-parser
        push: true
        tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/dwg-parser:${{ github.sha }},${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/dwg-parser:latest
        platforms: linux/amd64
        cache-from: type=gha
        cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Copy deployment files to VM
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.VM_HOST }}
        username: ${{ secrets.VM_USERNAME }}
        key: ${{ secrets.VM_SSH_KEY }}
        source: "docker-compose.prod.yml,nginx.conf,scripts/certbot-setup.sh"
        target: "~/deployment/"
        strip_components: 0

    - name: Deploy to Azure VM
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.VM_HOST }}
        username: ${{ secrets.VM_USERNAME }}
        key: ${{ secrets.VM_SSH_KEY }}
        script: |
          set -e

          # Create deployment directory
          mkdir -p ~/deployment
          cd ~/deployment

          # Make scripts executable
          chmod +x scripts/certbot-setup.sh

          # Login to GHCR
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin

          # Pull latest images
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/backend:${{ github.sha }}
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/dwg-parser:${{ github.sha }}

          # Tag as latest for docker compose
          docker tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/backend:${{ github.sha }} ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/backend:latest
          docker tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/dwg-parser:${{ github.sha }} ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/dwg-parser:latest

          # Rename docker-compose file
          mv docker-compose.prod.yml docker-compose.yml

          # Stop existing containers
          docker compose down || true

          # Start new containers
          docker compose up -d

          # Clean up old images
          docker image prune -f