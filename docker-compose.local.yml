services:
  dwg-parser:
    build:
      context: ./dwg-parser
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3000
      SWAGGER_URL: http://localhost:3000
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    ports:
      - "3001:3000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3000
      DWG_PARSER_URL: http://dwg-parser:3000
      FRONTEND_URL: http://localhost:5173
    depends_on:
      - dwg-parser
    restart: unless-stopped

  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"
    environment:
      VITE_BACKEND_URL: http://localhost:3001
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  frontend_node_modules:
