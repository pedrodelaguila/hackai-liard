events {
    worker_connections 1024;
}

http {
    upstream backend {
        server backend:3000;
    }

    upstream dwg_parser {
        server dwg-parser:3000;
    }

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;

    server {
        listen 443 ssl http2;
        server_name hackai-liard.duckdns.org www.hackai-liard.duckdns.org;

        # SSL configuration
        ssl_certificate /etc/letsencrypt/live/hackai-liard.duckdns.org/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/hackai-liard.duckdns.org/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;

        # CORS headers
        add_header Access-Control-Allow-Origin "http://localhost:5173" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-Requested-With" always;
        add_header Access-Control-Allow-Credentials "true" always;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;
        add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline'" always;

        # Backend API routes
        location /api/ {
            limit_req zone=api burst=20 nodelay;
            client_max_body_size 50M;
            proxy_pass http://backend/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 30s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }

        # DWG Parser routes
        location /dwg/ {
            limit_req zone=api burst=5 nodelay;
            proxy_pass http://dwg_parser/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
            client_max_body_size 50M;
        }

        # Health check endpoints
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # Default route for frontend or API docs
        location / {
            return 200 '{"status": "API Gateway Ready", "services": ["backend", "dwg-parser"]}';
            add_header Content-Type application/json;
        }
    }

    # HTTP redirect to HTTPS
    server {
        listen 80;
        server_name hackai-liard.duckdns.org www.hackai-liard.duckdns.org;
        return 301 https://$server_name$request_uri;
    }
}