version: '3.8'

services:
  backend:
    platform: linux/amd64
    image: ghcr.io/${GITHUB_REPOSITORY}/backend:latest
    ports:
      - "3001:3000"
    environment:
      - NODE_ENV=production
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - PORT=3000
      - APS_CLIENT_ID=${APS_CLIENT_ID}
      - APS_CLIENT_SECRET=${APS_CLIENT_SECRET}
      - APS_BUCKET_KEY=${APS_BUCKET_KEY}
      - FRONTEND_URL=${FRONTEND_URL}
      - DWG_PARSER_URL=${DWG_PARSER_URL}
      
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  dwg-parser:
    platform: linux/amd64
    image: ghcr.io/${GITHUB_REPOSITORY}/dwg-parser:latest
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - SWAGGER_URL=${SWAGGER_URL}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # nginx:
